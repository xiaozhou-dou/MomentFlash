<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一闪 · 留言</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
  overflow: hidden;
  background: #000;
  height: 100vh;
  width: 100vw;
}

/* --- Expired overlay --- */
.expired-overlay {
  position: fixed;
  inset: 0;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}
.expired-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.expired-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 28px;
}
.expired-icon svg { width: 36px; height: 36px; stroke: rgba(255,255,255,0.4); fill: none; stroke-width: 2; }

.expired-title {
  font-size: 28px;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}

.expired-desc {
  font-size: 15px;
  color: rgba(255,255,255,0.4);
  line-height: 1.5;
}

.expired-link {
  margin-top: 32px;
  color: rgba(255,255,255,0.3);
  font-size: 13px;
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 2px;
  transition: color 0.15s;
}
.expired-link:hover { color: rgba(255,255,255,0.6); }

/* --- Slideshow --- */
.slide-container {
  position: fixed;
  inset: 0;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.5s ease;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.slide.active {
  opacity: 1;
}

.slide-text {
  max-width: 80%;
  max-height: 80%;
  padding: 40px;
  font-size: clamp(24px, 5vw, 56px);
  font-weight: 600;
  line-height: 1.5;
  text-align: center;
  word-break: break-word;
  letter-spacing: -0.01em;
  text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  overflow-y: auto;
}

/* Navigation hint */
.nav-hint {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.35);
  font-size: 13px;
  z-index: 10;
  pointer-events: none;
  transition: opacity 0.6s;
}
.nav-hint.hidden { opacity: 0; }

/* Page indicator */
.page-indicator {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 10;
  display: flex;
  gap: 6px;
  align-items: center;
}

.page-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  transition: all 0.3s ease;
}
.page-dot.active {
  background: rgba(255,255,255,0.85);
  width: 24px;
  border-radius: 4px;
}

/* Arrow buttons (desktop) */
.slide-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.6);
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(4px);
}
.slide-arrow:hover {
  background: rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.9);
}
.slide-arrow:active { transform: translateY(-50%) scale(0.95); }
.slide-arrow.prev { left: 20px; }
.slide-arrow.next { right: 20px; }
.slide-arrow.hidden { display: none; }

@media (max-width: 600px) {
  .slide-arrow { display: none; }
  .slide-text { font-size: clamp(20px, 6vw, 32px); padding: 24px; }
  .page-indicator { bottom: 20px; right: 20px; }
}

/* Content transition */
.slide-text {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.slide.active .slide-text {
  opacity: 1;
  transform: translateY(0);
  transition-delay: 0.15s;
}
</style>
</head>
<body>

<!-- Expired overlay (shown by default if not first scan, or after view completes) -->
<div class="expired-overlay" id="expiredOverlay">
  <div class="expired-icon">
    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
  </div>
  <div class="expired-title">此内容已被查阅</div>
  <div class="expired-desc">该二维码已失效，无法再次查看</div>
  <a class="expired-link" href="/">创建你的一次性留言 →</a>
</div>

<!-- Slideshow -->
<div class="slide-container" id="slideContainer"></div>

<!-- Navigation arrows -->
<button class="slide-arrow prev hidden" id="prevArrow">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
</button>
<button class="slide-arrow next" id="nextArrow">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
</button>

<!-- Page indicator -->
<div class="page-indicator" id="pageIndicator"></div>

<!-- Navigation hint -->
<div class="nav-hint" id="navHint">点击或使用方向键浏览</div>

<script>
const project = {{ project | tojson }};
const isFirst = {{ is_first | tojson }};

// If this is NOT the first scan, show expired overlay
if (!isFirst) {
  document.getElementById("expiredOverlay").classList.add("show");
} else {
  initSlideshow(project.pages);
}

function initSlideshow(pages) {
  if (!pages || pages.length === 0) return;

  const container = document.getElementById("slideContainer");
  const indicator = document.getElementById("pageIndicator");
  let current = 0;

  // Build slides
  pages.forEach((page, i) => {
    const slide = document.createElement("div");
    slide.className = "slide" + (i === 0 ? " active" : "");
    slide.dataset.index = i;

    // Background
    if (page.background_type === "color") {
      slide.style.backgroundColor = page.background_value || "#ffffff";
      // Determine text color
      const hex = page.background_value || "#ffffff";
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      const brightness = r*0.299 + g*0.587 + b*0.114;
      slide.style.color = brightness > 150 ? "#1d1d1f" : "#ffffff";
      if (brightness > 150) {
        slide.style.textShadow = "none";
      }
    } else if (page.background_type === "gradient" || page.background_type === "image") {
      if (page.background_type === "image") {
        slide.style.backgroundImage = "url(" + (page.background_value || "") + ")";
      } else {
        slide.style.backgroundImage = page.background_value || "linear-gradient(135deg, #667eea, #764ba2)";
      }
      slide.style.color = "#ffffff";
    }

    const textEl = document.createElement("div");
    textEl.className = "slide-text";
    textEl.textContent = page.text_content || "…";

    slide.appendChild(textEl);
    container.appendChild(slide);

    // Dot
    const dot = document.createElement("div");
    dot.className = "page-dot" + (i === 0 ? " active" : "");
    indicator.appendChild(dot);
  });

  // Arrows
  const prevArrow = document.getElementById("prevArrow");
  const nextArrow = document.getElementById("nextArrow");

  function goTo(index) {
    const slides = container.querySelectorAll(".slide");
    const dots = indicator.querySelectorAll(".page-dot");
    slides.forEach(s => s.classList.remove("active"));
    dots.forEach(d => d.classList.remove("active"));
    slides[index].classList.add("active");
    dots[index].classList.add("active");
    current = index;
    prevArrow.classList.toggle("hidden", current === 0);
    nextArrow.classList.toggle("hidden", current === pages.length - 1);
  }

  function next() {
    if (current < pages.length - 1) goTo(current + 1);
  }

  function prev() {
    if (current > 0) goTo(current - 1);
  }

  prevArrow.addEventListener("click", prev);
  nextArrow.addEventListener("click", next);

  // Keyboard
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight" || e.key === "ArrowDown" || e.key === " ") {
      e.preventDefault();
      next();
    } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
      e.preventDefault();
      prev();
    }
  });

  // Click on slide to advance
  container.addEventListener("click", (e) => {
    // Don't advance if clicking an arrow
    if (e.target.closest(".slide-arrow")) return;
    const rect = container.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if (x < rect.width / 2) {
      prev();
    } else {
      next();
    }
  });

  // Touch swipe
  let touchStartX = 0;
  container.addEventListener("touchstart", (e) => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  container.addEventListener("touchend", (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) {
      if (dx > 0) prev();
      else next();
    }
  }, { passive: true });

  // Hide nav hint after interaction
  const navHint = document.getElementById("navHint");
  function hideHint() {
    navHint.classList.add("hidden");
    document.removeEventListener("click", hideHint);
    document.removeEventListener("keydown", hideHint);
  }
  document.addEventListener("click", hideHint);
  document.addEventListener("keydown", hideHint);

  // Show initial arrow state
  prevArrow.classList.add("hidden");
}
</script>
</body>
</html>

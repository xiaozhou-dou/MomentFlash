<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<meta name="x5-orientation" content="portrait">
<meta name="x5-fullscreen" content="true">
<meta name="full-screen" content="yes">
<title>MomentFlash</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  overflow: hidden;
  background: #000;
  height: 100%;
  width: 100%;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
}

/* --- Expired overlay --- */
.expired-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg, #0a0a0a 0%, #1a1a2e 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.expired-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.expired-icon {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 32px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
}
.expired-icon svg { width: 40px; height: 40px; stroke: rgba(255,255,255,0.35); fill: none; stroke-width: 1.5; }

.expired-title {
  font-size: clamp(24px, 6vw, 32px);
  font-weight: 700;
  color: rgba(255,255,255,0.88);
  margin-bottom: 12px;
  letter-spacing: -0.02em;
}

.expired-desc {
  font-size: clamp(14px, 3.5vw, 16px);
  color: rgba(255,255,255,0.35);
  line-height: 1.6;
  text-align: center;
  max-width: 280px;
}

.expired-link {
  margin-top: 40px;
  color: rgba(255,255,255,0.25);
  font-size: 14px;
  text-decoration: none;
  padding: 10px 24px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px;
  transition: all 0.3s ease;
}
.expired-link:hover, .expired-link:active { 
  color: rgba(255,255,255,0.6); 
  border-color: rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.05);
}

/* --- Slideshow --- */
.slide-container {
  position: fixed;
  inset: 0;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  -webkit-background-size: cover;
  /* Full viewport coverage */
  min-height: 100vh;
  min-height: 100dvh;
  min-width: 100vw;
  /* GPU acceleration for smooth transitions */
  will-change: opacity;
  transform: translateZ(0);
}

.slide.active {
  opacity: 1;
}

.slide-text {
  max-width: 85%;
  max-height: 80%;
  padding: clamp(20px, 5vw, 48px);
  font-size: clamp(20px, 5vw, 48px);
  font-weight: 600;
  line-height: 1.6;
  text-align: center;
  word-break: break-word;
  letter-spacing: -0.01em;
  text-shadow: 0 2px 30px rgba(0,0,0,0.4);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* Navigation hint */
.nav-hint {
  position: fixed;
  bottom: calc(28px + env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.3);
  font-size: 13px;
  z-index: 10;
  pointer-events: none;
  transition: opacity 0.8s ease;
  letter-spacing: 0.05em;
}
.nav-hint.hidden { opacity: 0; }

/* Page indicator */
.page-indicator {
  position: fixed;
  bottom: calc(24px + env(safe-area-inset-bottom, 0px));
  right: 24px;
  z-index: 10;
  display: flex;
  gap: 6px;
  align-items: center;
}

.page-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.page-dot.active {
  background: rgba(255,255,255,0.85);
  width: 20px;
  border-radius: 3px;
}

/* Arrow buttons (desktop) */
.slide-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.5);
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.25s ease;
  backdrop-filter: blur(8px);
}
.slide-arrow:hover {
  background: rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.85);
  border-color: rgba(255,255,255,0.15);
}
.slide-arrow:active { transform: translateY(-50%) scale(0.92); }
.slide-arrow.prev { left: 20px; }
.slide-arrow.next { right: 20px; }
.slide-arrow.hidden { display: none; }

/* Mobile adjustments */
@media (max-width: 600px) {
  .slide-arrow { display: none; }
  .slide-text { 
    padding: clamp(16px, 4vw, 24px); 
    max-width: 92%;
    max-height: 85%;
  }
  .page-indicator { 
    bottom: calc(16px + env(safe-area-inset-bottom, 0px)); 
    right: 16px; 
  }
}

/* Content transition */
.slide-text {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.slide.active .slide-text {
  opacity: 1;
  transform: translateY(0);
  transition-delay: 0.2s;
}

/* Safe area padding for notched devices */
@supports (padding: env(safe-area-inset-top)) {
  .slide-text {
    padding-top: max(clamp(20px, 5vw, 48px), env(safe-area-inset-top));
    padding-bottom: max(clamp(20px, 5vw, 48px), env(safe-area-inset-bottom));
  }
}
</style>
</head>
<body>

<!-- Expired overlay -->
<div class="expired-overlay" id="expiredOverlay">
  <div class="expired-icon">
    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
  </div>
  <div class="expired-title">此内容已被查看</div>
  <div class="expired-desc">该二维码已失效，无法再次查看</div>
  <a class="expired-link" href="/">创建你的一次性留言 →</a>
</div>

<!-- Slideshow -->
<div class="slide-container" id="slideContainer"></div>

<!-- Navigation arrows -->
<button class="slide-arrow prev hidden" id="prevArrow">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
</button>
<button class="slide-arrow next" id="nextArrow">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
</button>

<!-- Page indicator -->
<div class="page-indicator" id="pageIndicator"></div>

<!-- Navigation hint -->
<div class="nav-hint" id="navHint">点击或滑动浏览</div>

<script>
const project = {{ project | tojson }};
const isFirst = {{ is_first | tojson }};

if (!isFirst) {
  document.getElementById("expiredOverlay").classList.add("show");
} else {
  initSlideshow(project.pages);
}

function initSlideshow(pages) {
  if (!pages || pages.length === 0) return;

  const container = document.getElementById("slideContainer");
  const indicator = document.getElementById("pageIndicator");
  let current = 0;

  pages.forEach((page, i) => {
    const slide = document.createElement("div");
    slide.className = "slide" + (i === 0 ? " active" : "");
    slide.dataset.index = i;

    // Background
    if (page.background_type === "color") {
      slide.style.backgroundColor = page.background_value || "#ffffff";
      const hex = page.background_value || "#ffffff";
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      const brightness = r*0.299 + g*0.587 + b*0.114;
      if (brightness > 150 && !page.font_color) {
        slide.style.textShadow = "none";
      }
    } else if (page.background_type === "gradient") {
      slide.style.backgroundImage = page.background_value || "linear-gradient(135deg, #667eea, #764ba2)";
    } else if (page.background_type === "image") {
      slide.style.backgroundImage = "url(" + (page.background_value || "") + ")";
    }

    const textEl = document.createElement("div");
    textEl.className = "slide-text";
    textEl.textContent = page.text_content || "…";
    
    // Apply font styles from database
    if (page.font_color) {
      textEl.style.color = page.font_color;
    }
    if (page.font_family) {
      textEl.style.fontFamily = page.font_family;
    }
    if (page.font_size) {
      textEl.style.fontSize = page.font_size + "px";
    }

    slide.appendChild(textEl);
    container.appendChild(slide);

    // Dot
    const dot = document.createElement("div");
    dot.className = "page-dot" + (i === 0 ? " active" : "");
    indicator.appendChild(dot);
  });

  const prevArrow = document.getElementById("prevArrow");
  const nextArrow = document.getElementById("nextArrow");

  function goTo(index) {
    const slides = container.querySelectorAll(".slide");
    const dots = indicator.querySelectorAll(".page-dot");
    slides.forEach(s => s.classList.remove("active"));
    dots.forEach(d => d.classList.remove("active"));
    slides[index].classList.add("active");
    dots[index].classList.add("active");
    current = index;
    prevArrow.classList.toggle("hidden", current === 0);
    nextArrow.classList.toggle("hidden", current === pages.length - 1);
  }

  function next() {
    if (current < pages.length - 1) goTo(current + 1);
  }

  function prev() {
    if (current > 0) goTo(current - 1);
  }

  prevArrow.addEventListener("click", prev);
  nextArrow.addEventListener("click", next);

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight" || e.key === "ArrowDown" || e.key === " ") {
      e.preventDefault();
      next();
    } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
      e.preventDefault();
      prev();
    }
  });

  container.addEventListener("click", (e) => {
    if (e.target.closest(".slide-arrow")) return;
    const rect = container.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if (x < rect.width / 2) {
      prev();
    } else {
      next();
    }
  });

  // Touch swipe
  let touchStartX = 0;
  let touchStartY = 0;
  container.addEventListener("touchstart", (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  container.addEventListener("touchend", (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (dx > 0) prev();
      else next();
    }
  }, { passive: true });

  // Hide nav hint after interaction
  const navHint = document.getElementById("navHint");
  function hideHint() {
    navHint.classList.add("hidden");
    document.removeEventListener("click", hideHint);
    document.removeEventListener("keydown", hideHint);
    document.removeEventListener("touchstart", hideHint);
  }
  document.addEventListener("click", hideHint);
  document.addEventListener("keydown", hideHint);
  document.addEventListener("touchstart", hideHint);

  // Auto-hide hint after 3 seconds
  setTimeout(() => {
    if (!navHint.classList.contains("hidden")) {
      navHint.classList.add("hidden");
    }
  }, 3000);

  prevArrow.classList.add("hidden");
}
</script>
</body>
</html>

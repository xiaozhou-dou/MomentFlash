<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一闪 · 一次性留言</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f4f5f7;
  --surface: #ffffff;
  --border: #e0e2e6;
  --text: #1d1d1f;
  --text-secondary: #6e6e73;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* --- Toolbar --- */
.toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.toolbar-brand {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
.toolbar-brand span { color: var(--accent); }

.toolbar-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  transition: all 0.15s ease;
  line-height: 1.4;
}
.btn:hover { background: #f0f1f3; }
.btn-primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.btn-danger {
  color: #d32f2f;
  border-color: #ffcdd2;
}
.btn-danger:hover { background: #ffebee; }
.btn-sm { padding: 5px 12px; font-size: 13px; }

/* --- Layout --- */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

.section-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

/* --- Page Editor Cards --- */
.page-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.page-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  transition: all 0.2s ease;
  position: relative;
}
.page-card:first-child { border-left: 3px solid var(--accent); }

.page-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.page-number {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  background: var(--bg);
  padding: 3px 10px;
  border-radius: 100px;
}

.page-content-row {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 20px;
}

@media (max-width: 720px) {
  .page-content-row { grid-template-columns: 1fr; }
}

.page-text-area {
  width: 100%;
  min-height: 100px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 15px;
  font-family: inherit;
  line-height: 1.6;
  resize: vertical;
  color: var(--text);
  background: var(--surface);
  transition: border-color 0.15s;
}
.page-text-area:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
}

/* --- Mini Preview --- */
.mini-preview {
  width: 100%;
  height: 140px;
  border-radius: 8px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  background-size: cover;
  background-position: center;
}
.mini-preview-text {
  padding: 16px;
  font-size: 14px;
  line-height: 1.5;
  text-align: center;
  word-break: break-word;
  max-width: 100%;
}

/* --- Background Options --- */
.bg-options { margin-top: 10px; }

.bg-type-selector {
  display: flex;
  gap: 4px;
  background: var(--bg);
  border-radius: 8px;
  padding: 3px;
  margin-bottom: 10px;
}

.bg-type-btn {
  flex: 1;
  padding: 5px 8px;
  border: none;
  background: transparent;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
}
.bg-type-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}

.bg-control {
  display: flex;
  gap: 8px;
  align-items: center;
}

.bg-control input[type="color"] {
  width: 36px;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px;
  cursor: pointer;
  background: none;
}

.gradient-presets {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.gradient-swatch {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
}
.gradient-swatch:hover { transform: scale(1.1); }
.gradient-swatch.active { border-color: var(--accent); }

.file-upload-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 14px;
  border: 1px dashed var(--border);
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  background: var(--surface);
}
.file-upload-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.file-upload-input { display: none; }

.uploaded-image-name {
  font-size: 12px;
  color: var(--text-secondary);
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* --- Footer Actions --- */
.footer-actions {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 100;
}

/* --- QR Modal --- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal-box {
  background: var(--surface);
  border-radius: 16px;
  padding: 40px 36px 32px;
  max-width: 440px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: modalIn 0.25s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}
.modal-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 20px;
}

.qr-image {
  width: 220px;
  height: 220px;
  margin: 0 auto 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
}
.qr-image img {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
}

.qr-url {
  font-size: 12px;
  color: var(--accent);
  word-break: break-all;
  margin-bottom: 16px;
}

.modal-close-btn {
  margin-top: 4px;
}

/* --- Loading --- */
.loading-spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* --- Notification Toast --- */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #323232;
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 300;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Toolbar -->
<header class="toolbar">
  <div class="toolbar-brand">一闪 <span>·</span> 一次性留言</div>
  <div class="toolbar-actions">
    <button class="btn btn-sm" id="addPageBtn" title="添加一页">+ 添加页面</button>
    <button class="btn btn-primary" id="generateBtn">生成二维码</button>
  </div>
</header>

<!-- Main -->
<div class="container">
  <div class="section-title">页面列表</div>
  <div class="page-list" id="pageList"></div>
</div>

<!-- Footer -->
<div class="footer-actions">
  <button class="btn" id="addPageBtn2">+ 添加页面</button>
  <button class="btn btn-primary" id="generateBtn2">生成二维码</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- QR Modal -->
<div class="modal-overlay" id="qrModal">
  <div class="modal-box">
    <div class="modal-title">二维码已生成</div>
    <div class="modal-subtitle">扫描后内容将永久失效，仅可查看一次</div>
    <div class="qr-image" id="qrImageContainer">
      <img id="qrImage" alt="QR Code">
    </div>
    <div class="qr-url" id="qrUrl"></div>
    <button class="btn btn-primary modal-close-btn" id="modalCloseBtn">我知道了</button>
  </div>
</div>

<script>
// --- Gradient Presets ---
const GRADIENT_PRESETS = [
  { name: "日落", value: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)" },
  { name: "海洋", value: "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)" },
  { name: "森林", value: "linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)" },
  { name: "暮光", value: "linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)" },
  { name: "火焰", value: "linear-gradient(135deg, #fa709a 0%, #fee140 100%)" },
  { name: "极光", value: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)" },
  { name: "热浪", value: "linear-gradient(135deg, #f6d365 0%, #fda085 100%)" },
  { name: "深空", value: "linear-gradient(135deg, #0c3483 0%, #a2b6df 100%)" },
];

let pageCounter = 0;
const pageList = document.getElementById("pageList");

// --- Page Model ---
function createPageData() {
  return {
    id: ++pageCounter,
    text: "",
    bgType: "color",
    bgValue: "#ffffff",
    textColor: "#1d1d1f",
    imageUrl: null,
    imageName: null,
  };
}

// --- Render a page card ---
function renderPage(data) {
  const card = document.createElement("div");
  card.className = "page-card";
  card.dataset.pageId = data.id;

  // Compute preview style
  function getPreviewStyle(d) {
    let bg, color;
    if (d.bgType === "color") {
      bg = d.bgValue;
      color = getTextColor(d.bgValue);
    } else if (d.bgType === "gradient") {
      bg = d.bgValue;
      color = "#ffffff";
    } else if (d.bgType === "image" && d.imageUrl) {
      bg = `url(${d.imageUrl}) center/cover no-repeat`;
      color = "#ffffff";
    } else {
      bg = "#ffffff";
      color = "#1d1d1f";
    }
    return { background: bg, color };
  }

  function getTextColor(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return (r*0.299 + g*0.587 + b*0.114) > 150 ? "#1d1d1f" : "#ffffff";
  }

  card.innerHTML = `
    <div class="page-card-header">
      <span class="page-number">第 ${pageList.children.length + 1} 页</span>
      <button class="btn btn-sm btn-danger remove-page-btn">删除</button>
    </div>
    <div class="page-content-row">
      <div>
        <textarea class="page-text-area" placeholder="在这页写下你想说的话…">${escapeHtml(data.text)}</textarea>
      </div>
      <div>
        <div class="mini-preview" id="preview-${data.id}">
          <div class="mini-preview-text" id="previewText-${data.id}">${escapeHtml(data.text) || "预览"}</div>
        </div>
        <div class="bg-options">
          <div class="bg-type-selector">
            <button class="bg-type-btn ${data.bgType === 'color' ? 'active' : ''}" data-type="color">颜色</button>
            <button class="bg-type-btn ${data.bgType === 'gradient' ? 'active' : ''}" data-type="gradient">渐变</button>
            <button class="bg-type-btn ${data.bgType === 'image' ? 'active' : ''}" data-type="image">图片</button>
          </div>
          <div class="bg-control" id="bgControl-${data.id}">
          </div>
        </div>
      </div>
    </div>
  `;

  // --- Wire up events ---

  // Text input
  const textarea = card.querySelector(".page-text-area");
  textarea.addEventListener("input", () => {
    data.text = textarea.value;
    updatePreview(data);
  });

  // Remove button
  card.querySelector(".remove-page-btn").addEventListener("click", () => {
    if (pageList.children.length <= 1) {
      showToast("至少保留一页");
      return;
    }
    card.remove();
    renumberPages();
  });

  // Background type buttons
  card.querySelectorAll(".bg-type-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      card.querySelectorAll(".bg-type-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      data.bgType = btn.dataset.type;
      renderBgControl(data, card);
      updatePreview(data);
    });
  });

  // Initial bg control
  renderBgControl(data, card);
  updatePreview(data);

  return card;

  // --- Helper: update preview ---
  function updatePreview(d) {
    const preview = document.getElementById(`preview-${d.id}`);
    const previewText = document.getElementById(`previewText-${d.id}`);
    if (!preview) return;
    const style = getPreviewStyle(d);
    preview.style.background = style.background;
    previewText.style.color = style.color;
    previewText.textContent = d.text || "预览";
  }

  // --- Helper: render bg control ---
  function renderBgControl(d, cardEl) {
    const container = cardEl.querySelector(`#bgControl-${d.id}`);
    if (!container) return;
    container.innerHTML = "";

    if (d.bgType === "color") {
      const input = document.createElement("input");
      input.type = "color";
      input.value = d.bgValue;
      input.addEventListener("input", () => {
        d.bgValue = input.value;
        updatePreview(d);
      });
      container.appendChild(input);
    } else if (d.bgType === "gradient") {
      const wrap = document.createElement("div");
      wrap.className = "gradient-presets";
      GRADIENT_PRESETS.forEach((g, i) => {
        const swatch = document.createElement("div");
        swatch.className = "gradient-swatch";
        if (d.bgValue === g.value) swatch.classList.add("active");
        swatch.title = g.name;
        swatch.style.background = g.value;
        swatch.addEventListener("click", () => {
          wrap.querySelectorAll(".gradient-swatch").forEach(s => s.classList.remove("active"));
          swatch.classList.add("active");
          d.bgValue = g.value;
          updatePreview(d);
        });
        wrap.appendChild(swatch);
      });
      container.appendChild(wrap);
    } else if (d.bgType === "image") {
      const label = document.createElement("label");
      label.className = "file-upload-btn";
      if (d.imageName) {
        label.innerHTML = `<span class="uploaded-image-name">${escapeHtml(d.imageName)}</span>`;
      } else {
        label.textContent = "选择图片";
      }
      const fileInput = document.createElement("input");
      fileInput.type = "file";
      fileInput.className = "file-upload-input";
      fileInput.accept = "image/*";
      fileInput.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append("file", file);
        try {
          label.innerHTML = "<span style='font-size:12px;color:#999'>上传中…</span>";
          const resp = await fetch("/api/upload", { method: "POST", body: formData });
          const result = await resp.json();
          if (result.url) {
            d.imageUrl = result.url;
            d.imageName = file.name;
            d.bgValue = result.url;
            label.innerHTML = `<span class="uploaded-image-name">${escapeHtml(file.name)}</span>`;
            updatePreview(d);
          }
        } catch (err) {
          showToast("图片上传失败");
          label.textContent = "选择图片";
        }
      });
      label.appendChild(fileInput);
      container.appendChild(label);
      if (d.imageUrl) {
        const removeBtn = document.createElement("button");
        removeBtn.className = "btn btn-sm btn-danger";
        removeBtn.textContent = "移除";
        removeBtn.style.marginLeft = "6px";
        removeBtn.addEventListener("click", () => {
          d.imageUrl = null;
          d.imageName = null;
          d.bgValue = "#ffffff";
          renderBgControl(d, cardEl);
          updatePreview(d);
        });
        container.appendChild(removeBtn);
      }
    }
  }
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function renumberPages() {
  Array.from(pageList.children).forEach((card, i) => {
    const num = card.querySelector(".page-number");
    if (num) num.textContent = `第 ${i + 1} 页`;
  });
}

// --- Add page ---
// --- Generate QR Code ---
async function generateQR() {
  const generateBtn = document.getElementById("generateBtn");
  const generateBtn2 = document.getElementById("generateBtn2");
  const btns = [generateBtn, generateBtn2];

  btns.forEach(b => { b.disabled = true; b.innerHTML = '<span class="loading-spinner"></span> 生成中…'; });

  try {
    const pages = [];
    Array.from(pageList.children).forEach(card => {
      const pageId = parseInt(card.dataset.pageId);
      const data = findPageData(pageId);
      if (!data) return;
      pages.push({
        text: data.text,
        bg_type: data.bgType === "image" ? "color" : data.bgType,
        bg_value: data.bgType === "image" ? "#1a1a2e" : data.bgValue,
      });
    });

    if (pages.length === 0) {
      showToast("请至少添加一页内容");
      return;
    }

    const resp = await fetch("/api/create", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pages, title: "" }),
    });
    const result = await resp.json();

    if (result.qr_png_b64) {
      document.getElementById("qrImage").src = "data:image/png;base64," + result.qr_png_b64;
      document.getElementById("qrUrl").textContent = result.view_url;
      document.getElementById("qrModal").classList.add("open");
    }
  } catch (err) {
    showToast("生成失败，请重试");
  } finally {
    btns.forEach(b => { b.disabled = false; b.innerHTML = "生成二维码"; });
  }
}

// We need to track page data objects
const pageDataMap = new Map();

function createPageData() {
  const data = {
    id: ++pageCounter,
    text: "",
    bgType: "color",
    bgValue: "#ffffff",
    textColor: "#1d1d1f",
    imageUrl: null,
    imageName: null,
  };
  pageDataMap.set(data.id, data);
  return data;
}

function findPageData(id) {
  return pageDataMap.get(id);
}

// Override addPage to use the new data tracking
function addPage() {
  const data = createPageData();
  const card = renderPage(data);
  pageList.appendChild(card);
  renumberPages();
}
// Init with 1 page
pageList.innerHTML = "";
pageDataMap.clear();
pageCounter = 0;
addPage();
// Add page buttons
document.getElementById("addPageBtn").addEventListener("click", addPage);
document.getElementById("addPageBtn2").addEventListener("click", addPage);

// Generate button
document.getElementById("generateBtn").addEventListener("click", generateQR);
document.getElementById("generateBtn2").addEventListener("click", generateQR);

// Modal close
document.getElementById("modalCloseBtn").addEventListener("click", () => {
  document.getElementById("qrModal").classList.remove("open");
});
document.getElementById("qrModal").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById("qrModal").classList.remove("open");
  }
});

// Toast
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove("show"), 2500);
}
</script>
</body>
</html>
